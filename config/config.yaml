schedule:
  weekday: monday
  time: "08:00"

topics:
  - Teradata ML
  - LLMs
  - GenAI
  - AI
  - AI Agents
  - NLP
  - Spark
  - Docker
  - Kubernetes
  - MCPs
  - Airflow
  - Analysis
