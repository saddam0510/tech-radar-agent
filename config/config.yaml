tools:
  - Python
  - PySpark
  - Airflow
  - Jupyter
  - Teradata SQL
  - Teradata ML
  - Claude
  - GPTs
  - OpenCLaW
  - LangChain
  - LlamaIndex
  - HuggingFace
  - Transformers
  - FastAPI
  - RAG
  - LoRA
  - RLHF

users:
  - email: Saddam.salah510@gmail.com
    name: Saddam

  - email: aa01096220361@gmail.com
    name: Aya

newsletter:
  title: "Weekly Tech Radar"
  subtitle: "Your curated AI & Technology digest"
  max_articles_per_topic: 5
  max_per_section: 5           # hard cap on articles shown per section in the email
  days_back: 7

# Per-topic phrase gates — article must contain at least one phrase to match the topic.
# Use this for topics that are product/package names to avoid false positives from
# general keyword overlap (e.g. "teradataml" package vs. generic "Teradata ML" content).
topic_phrases:
  "Teradata ML":
    - "teradataml"
    - "teradata ml"
    - "teradata python"
    - "teradata vantage ml"

llm:
  enabled: false
  provider: claude
  model: claude-sonnet-4-6
  summarize_threshold: 300

processing:
  min_relevance_score: 0.2
  semantic_matching: false        # set true after: pip install sentence-transformers torch
  dedup_title_similarity: 0.85

# ─── Sources ──────────────────────────────────────────────────────────────────
# Tier 1 = high-signal structured  (prioritised in ranking)
# Tier 2 = semi-structured community (limited in ranking)
# Tier 3 = noisy / optional         (disabled by default)

sources:

  # ════════════════════ TIER 1 — High Signal ════════════════════════════════

  arxiv:
    enabled: true
    tier: 1
    categories:
      - cs.AI
      - cs.LG
      - cs.CL
      - cs.NE
      - cs.DC
    max_results: 60

  github:
    enabled: true
    tier: 1
    # Watched repos for release tracking
    watched_repos:
      - apache/airflow
      - apache/spark
      - kubernetes/kubernetes
      - docker/compose
      - huggingface/transformers
      - huggingface/peft
      - langchain-ai/langchain
      - run-llama/llama_index
      - ollama/ollama
      - microsoft/autogen
      - openai/openai-python
      - anthropics/anthropic-sdk-python
      - Teradata/teradataml
    # Keyword-based repo search
    search_queries:
      - "large language model"
      - "LLM agent"
      - "RAG retrieval augmented"
      - "apache airflow"
      - "pyspark data engineering"
      - "NLP transformer"
      - "machine learning"
    max_results_per_query: 8
    min_stars: 20
    # Trending repos (new repos with high stars this week)
    include_trending: true
    trending_topics:
      - LLM
      - agent AI
      - RAG
      - spark
      - airflow
      - kubernetes
      - MCP model context
    max_trending_per_query: 5
    trending_min_stars: 100

  huggingface:
    enabled: true
    tier: 1
    fetch_models: true
    max_models: 15              # new models from Hub API

  papers_with_code:
    enabled: true
    tier: 1
    max_results: 30

  semantic_scholar:
    enabled: true
    tier: 1
    queries:
      - "large language models agents"
      - "generative AI NLP"
      - "transformer machine learning"
      - "PySpark data engineering"
    max_results_per_query: 8
    # Optional: set S2_API_KEY in .env for higher rate limits

  acl:
    enabled: true
    tier: 1
    queries:
      - "NLP natural language processing"
      - "machine translation neural"
      - "text classification generation"
    max_results_per_query: 8

  official_blogs:
    enabled: true
    tier: 1
    # Disable individual feeds without removing them:
    feed_overrides:
      []
      # Example to disable a feed:
      # - name: "Towards Data Science"
      #   enabled: false
    # Add your own RSS feeds here:
    extra_feeds:
      []
      # Example:
      # - name: "Andrej Karpathy Blog"
      #   url: "https://karpathy.github.io/feed.xml"
      #   topic_hints: ["AI", "Machine Learning"]
      #   content_type: "News & Articles"

  # ════════════════════ TIER 2 — Semi-Structured ════════════════════════════

  medium:
    enabled: true
    tier: 2
    tags:
      - artificial-intelligence
      - machine-learning
      - llm
      - docker
      - kubernetes
      - data-science
      - nlp
      - genai
      - data-engineering
      - apache-airflow

  reddit:
    enabled: false              # enable after setting REDDIT_CLIENT_ID/SECRET in .env
    tier: 2
    subreddits:
      - MachineLearning
      - LocalLLaMA
      - dataengineering
      - artificial
      - docker
      - kubernetes
      - apacheairflow
      - Python
      - MLOps
    limit_per_subreddit: 50
    filters:
      min_upvotes: 50           # quality gate — only posts with >= 50 upvotes

  youtube:
    enabled: false              # enable after setting YOUTUBE_API_KEY in .env
    tier: 2
    search_queries:
      - "AI agents 2025"
      - "LLM fine-tuning"
      - "Apache Airflow tutorial"
      - "Kubernetes deep dive"
    # Optionally restrict to specific channel IDs:
    channel_ids: []             # leave empty to skip channel-specific fetch
    max_results_per_query: 10
    filters:
      min_views: 10000          # only videos with >= 10k views

  docs:
    enabled: false              # merged into official_blogs; keep for custom RSS
    tier: 2
    feeds:
      - name: PyPI New Packages
        url: https://pypi.org/rss/updates.xml
        topic_hint: Python

  # ════════════════════ TIER 3 — Optional / Noisy ═══════════════════════════

  google_scholar:
    enabled: false              # heavily rate-limited; use semantic_scholar instead
    tier: 3
    queries:
      - "large language models"
      - "generative AI"
    max_results_per_query: 5

  linkedin:
    enabled: false              # placeholder; see sources/linkedin_source.py
    tier: 3
